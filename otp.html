<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Smart Bite </title>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="assets/logo.png" alt="Smart Canteen Logo" class="w-10 h-10 rounded-md" />
        <div>
          <h1 class="text-xl md:text-2xl font-bold text-gray-800">Smart Bite</h1>
          <p class="text-xs text-gray-500">Secure OTP verification</p>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto px-4 md:px-6 py-8 flex justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8 text-center">
      <h2 class="text-2xl font-semibold text-gray-900 mb-2">Verify OTP</h2>
      <p id="sentTo" class="text-sm text-gray-600 mb-6"></p>

      <div class="flex justify-center gap-2 mb-4">
        <input id="d1" maxlength="1" class="w-12 h-12 text-center text-xl border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300">
        <input id="d2" maxlength="1" class="w-12 h-12 text-center text-xl border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300">
        <input id="d3" maxlength="1" class="w-12 h-12 text-center text-xl border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300">
        <input id="d4" maxlength="1" class="w-12 h-12 text-center text-xl border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300">
      </div>

      <button
        onclick="verify()"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white py-2.5 rounded-lg text-sm font-semibold shadow-sm mb-3"
      >
        Verify
      </button>

      <button
        onclick="resend()"
        class="text-xs text-orange-600 hover:underline"
      >
        Resend OTP
      </button>
    </div>
  </main>

<script>
const phone = localStorage.getItem('phone') || 'Unknown';
document.getElementById('sentTo').innerText = 'OTP sent to +91 ' + phone;

const inputs = [
  document.getElementById('d1'),
  document.getElementById('d2'),
  document.getElementById('d3'),
  document.getElementById('d4')
];

inputs.forEach((el, idx) => {
  el.addEventListener('input', () => {
    el.value = el.value.replace(/\D/g,'');
    if(el.value && idx < inputs.length - 1) inputs[idx+1].focus();
  });
});

function getEnteredOtp(){
  return inputs.map(i => i.value || '').join('');
}

function verify(){
  const entered = getEnteredOtp();
  const real = localStorage.getItem('otp');
  if(entered === real){
    localStorage.setItem('isLoggedIn', 'true');
    if(localStorage.getItem('isStaff') === 'true'){
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'menu.html';
    }
  } else {
    alert('Incorrect OTP. For demo, OTP is: ' + real);
  }
}

function resend(){
  const code = String(Math.floor(1000 + Math.random()*9000));
  localStorage.setItem('otp', code);
  alert('New demo OTP: ' + code);
}
</script>
</body>
</html>
