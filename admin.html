<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Smart Canteen | Admin Dashboard</title>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- 🔒 ADMIN PROTECTION -->
<script>
  if (localStorage.getItem("adminAuth") !== "true") {
    window.location.href = "admin-login.html";
  }
</script>

<!-- NAVBAR -->
<header class="bg-white shadow-sm">
  <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img src="assets/logo.png" alt="Smart Canteen Logo" class="w-10 h-10 rounded-md" />
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-gray-800">Smart Canteen | Admin</h1>
        <p class="text-xs text-gray-500">Monitor orders, sales & inventory</p>
      </div>
    </div>

    <button
      onclick="logoutAdmin()"
      class="inline-flex items-center text-sm font-medium text-gray-700 border border-gray-300 rounded-lg px-3 py-1.5 hover:bg-gray-50 transition"
    >
      Logout
    </button>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="max-w-6xl mx-auto px-4 md:px-6 py-6 md:py-8">

  <!-- TOP ROW -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
    <div>
      <h2 class="text-2xl md:text-3xl font-semibold text-gray-900">Dashboard Overview</h2>
      <p class="text-sm text-gray-600 mt-1">
        Live view of today’s performance and active orders.
      </p>
    </div>

    <button onclick="resetSales()"
      class="inline-flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm">
      ⟳ Reset Today’s Sales & Inventory
    </button>
  </div>

  <!-- STATS CARDS -->
  <section class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">

    <!-- Sales Summary -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide">
          Today’s Sales
        </h3>
        <span class="text-xs px-2 py-1 rounded-full bg-green-50 text-green-700 border border-green-200">
          Live
        </span>
      </div>

      <p id="totalRevenue" class="text-3xl md:text-4xl font-bold text-orange-500">₹0</p>
      <p class="text-sm text-gray-600 mt-2">
        Orders today:
        <span id="totalOrders" class="font-semibold text-gray-800">0</span>
      </p>
    </div>

    <!-- Inventory Summary -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide">
          Inventory Summary (Today)
        </h3>
        <span class="text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-700 border border-blue-200">
          Auto-updated
        </span>
      </div>

      <div id="inventoryList" class="text-sm text-gray-700 space-y-1 max-h-32 overflow-y-auto pr-1">
      </div>
    </div>

  </section>

  <!-- ACTIVE ORDERS -->
  <section>
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-lg md:text-xl font-semibold text-gray-900">
        Pending Orders
      </h3>
    </div>

    <div id="orders" class="space-y-4"></div>
  </section>

</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDtsVenEUn1f1wcKUq6R5_9_028Mmnvozc",
  authDomain: "smart-canteen-e2c54.firebaseapp.com",
  databaseURL: "https://smart-canteen-e2c54-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smart-canteen-e2c54",
  storageBucket: "smart-canteen-e2c54.firebasestorage.app",
  messagingSenderId: "758517185152",
  appId: "1:758517185152:web:1a6242eacee41d41478465"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<script>
/* ---------------- ADMIN LOGOUT ---------------- */
function logoutAdmin() {
  localStorage.removeItem("adminAuth");
  window.location.href = "admin-login.html";
}

/* ---------------- RENDER ORDERS WITH ITEMS ---------------- */
function renderOrders(ordersObj) {
  const container = document.getElementById("orders");
  const orders = Object.values(ordersObj || {}).filter(o => o.status !== "ready");

  if (orders.length === 0) {
    container.innerHTML = `
      <div class="bg-white rounded-xl p-6 border text-center text-gray-500">
        No pending orders right now.
      </div>`;
    return;
  }

  container.innerHTML = orders.map(order => `
    <article class="bg-white rounded-xl p-5 shadow-sm border">

      <!-- HEADER -->
      <div class="flex justify-between mb-2">
        <span class="font-mono font-semibold text-gray-900">#${order.orderId}</span>
        <span class="text-orange-500 font-semibold">₹${order.total}</span>
      </div>

      <p class="text-sm text-gray-700 mb-1">
        Phone: <span class="font-medium">${order.phone}</span>
      </p>
      <p class="text-xs text-gray-500 mb-3">
        Payment: ${order.paymentMethod}
      </p>

      <!-- ITEMS LIST -->
      <div class="border-t border-gray-200 pt-3 mt-3">
        <h4 class="text-xs font-semibold text-gray-500 uppercase mb-2">Items</h4>

        <ul class="space-y-1 text-sm text-gray-800">
          ${order.items
            .map(
              item => `
            <li class="flex justify-between">
              <span>${item.name}</span>
              <span class="text-gray-600">× ${item.qty}</span>
            </li>
            `
            )
            .join("")}
        </ul>
      </div>

      <!-- READY BUTTON -->
      <button
        onclick="markReady('${order.orderId}')"
        class="mt-4 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-semibold"
      >
        Mark Ready
      </button>

    </article>
  `).join("");
}

/* ---------- MARK READY ---------- */
function markReady(id) {
  db.ref("orders/" + id).update({ status: "ready" });
  alert("Order " + id + " marked READY ✔");
}

/* ---------- RESET SALES ---------- */
function resetSales() {
  db.ref("admin/resetTimestamp").set(Date.now());
  db.ref("inventory").set({});
  alert("Sales & inventory reset!");
}

/* ---------- LISTEN TO FIREBASE ---------- */
db.ref().on("value", snap => {
  const data = snap.val() || {};
  const orders = data.orders || {};
  const inventory = data.inventory || {};
  const resetTime = data.admin?.resetTimestamp || 0;

  renderOrders(orders);

  // Sales summary
  let totalOrders = 0, revenue = 0;
  Object.values(orders).forEach(o => {
    if (o.timestamp > resetTime) {
      totalOrders++;
      revenue += o.total;
    }
  });

  document.getElementById("totalOrders").innerText = totalOrders;
  document.getElementById("totalRevenue").innerText = "₹" + revenue;

  // Inventory
  const box = document.getElementById("inventoryList");
  if (Object.keys(inventory).length === 0) {
    box.innerHTML = "<p class='text-gray-500 text-sm'>No sales today.</p>";
  } else {
    box.innerHTML = Object.keys(inventory)
      .map(id => `<p>${id.replace(/-/g," ")}: <b>${inventory[id]}</b></p>`)
      .join("");
  }
});
</script>

</body>
</html>
