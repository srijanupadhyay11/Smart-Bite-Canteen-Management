<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Smart Bite | Login</title>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex items-center gap-3">
      <img src="assets/logo.png" class="w-10 h-10 rounded-md" />
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-gray-800">Smart Bite</h1>
        <p class="text-xs text-gray-500">Simple and fast food ordering</p>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto px-4 md:px-6 py-8 flex justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">
      <h2 class="text-2xl font-semibold text-gray-900 mb-2">Login</h2>
      <p class="text-sm text-gray-600 mb-6">
        Enter your mobile number to continue.
      </p>

      <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
      <div class="flex mb-1">
        <div class="px-3 flex items-center bg-gray-100 border border-r-0 border-gray-300 rounded-l-md text-gray-700 text-sm">
          +91
        </div>
        <input
          id="phone"
          type="tel"
          maxlength="10"
          placeholder="9876543210"
          class="flex-1 p-3 border border-gray-300 rounded-r-md focus:ring-2 focus:ring-orange-300 focus:border-orange-400 text-sm outline-none"
        />
      </div>

      <!-- <p class="text-xs text-gray-400 mb-6">
        For demo, OTP will appear on screen after pressing "Send OTP".
      </p> -->

      <button
        onclick="sendOTP()"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white py-2.5 rounded-lg text-sm font-semibold shadow-sm"
      >
        Send OTP
      </button>
    </div>
  </main>

<script>
function sendOTP(){
  const phone = document.getElementById('phone').value.trim();

  if(!/^\d{10}$/.test(phone)){
    alert('Please enter a valid 10-digit mobile number.');
    return;
  }

  // Store phone
  localStorage.setItem('phone', phone);

  // Demo OTP
  const code = String(Math.floor(1000 + Math.random() * 9000));
  localStorage.setItem('otp', code);

  alert("Demo OTP (for testing): " + code);

  // Redirect to OTP page
  window.location.href = "otp.html";
}
</script>

</body>
</html>
