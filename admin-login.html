<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Admin Login | Smart Bite</title>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <header class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 md:px-6 py-4 flex items-center gap-3">
      <img src="/assets/logo.png" class="w-10 h-10 rounded-md">
      <h1 class="text-xl md:text-2xl font-bold text-gray-800">Admin Login</h1>
    </div>
  </header>

  <!-- MAIN LOGIN CARD -->
  <main class="max-w-6xl mx-auto px-4 md:px-6 py-10 flex justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">

      <h2 class="text-2xl font-semibold text-gray-900 mb-2">Admin Login</h2>
      <p class="text-sm text-gray-600 mb-6">Enter admin ID and password</p>

      <label class="block text-sm font-medium text-gray-700 mb-1">Admin ID</label>
      <input id="adminId" type="text"
        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 mb-4">

      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input id="adminPass" type="password"
        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 mb-6">

      <button onclick="loginAdmin()"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white py-2.5 rounded-lg text-sm font-semibold shadow-sm">
        Login
      </button>

      <p id="err" class="text-xs text-red-500 mt-3 hidden">Invalid admin credentials</p>

    </div>
  </main>

<script>
// CHANGE YOUR ADMIN CREDENTIALS HERE:
const ADMIN_ID = "Admin";
const ADMIN_PASS = "12345";

function loginAdmin(){
  const id = document.getElementById("adminId").value.trim();
  const pass = document.getElementById("adminPass").value.trim();

  if(id === ADMIN_ID && pass === ADMIN_PASS){
    localStorage.setItem("adminAuth", "true");
    window.location.href = "admin.html";
  } else {
    document.getElementById("err").classList.remove("hidden");
  }
}
</script>

</body>
</html>
